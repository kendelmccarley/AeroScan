# Prevent DVB kernel drivers from claiming the RTL2832U chip.
# librtlsdr (used by dump1090) accesses the dongle directly via libusb;
# these DVB modules would otherwise grab the device first and block it.
blacklist dvb_usb_rtl28xxu
blacklist dvb_usb_v2
blacklist rtl2832
blacklist rtl2832_sdr
blacklist rtl2838

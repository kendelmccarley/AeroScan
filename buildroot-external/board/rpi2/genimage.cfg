/*
 * AeroScan RPi 2 SD card image layout
 *
 * Partition 1 - FAT32 boot (64 MB)
 *   Contains: GPU firmware blobs, kernel (zImage), DTB, config.txt, cmdline.txt
 *
 * Partition 2 - ext4 rootfs (1 GB, matches BR2_TARGET_ROOTFS_EXT2_SIZE)
 */

image boot.vfat {
	vfat {
		files = {
			"bcm2709-rpi-2-b.dtb",
			"rpi-firmware/bootcode.bin",
			"rpi-firmware/cmdline.txt",
			"rpi-firmware/config.txt",
			"rpi-firmware/fixup.dat",
			"rpi-firmware/start.elf",
			"rpi-firmware/overlays/",
			"zImage"
		}
	}
	size = 64M
}

image sdcard.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}

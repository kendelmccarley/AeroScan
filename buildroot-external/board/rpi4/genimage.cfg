/*
 * AeroScan RPi 4 SD card image layout
 *
 * Partition 1 - FAT32 boot (64 MB)
 *   Contains: GPU firmware blobs (start4.elf/fixup4.dat), kernel (Image),
 *             DTB (bcm2711-rpi-4-b.dtb), overlays, config.txt, cmdline.txt
 *   Note: bootcode.bin is NOT included — RPi4 first-stage boot is in EEPROM.
 *
 * Partition 2 - ext4 rootfs (matches BR2_TARGET_ROOTFS_EXT2_SIZE)
 */

image boot.vfat {
	vfat {
		files = {
			"bcm2711-rpi-4-b.dtb",
			"rpi-firmware/cmdline.txt",
			"rpi-firmware/cmdline-hdmi.txt",
			"rpi-firmware/config.txt",
			"rpi-firmware/display-dsi.txt",
			"rpi-firmware/display-hdmi.txt",
			"rpi-firmware/fixup4.dat",
			"rpi-firmware/start4.elf",
			"rpi-firmware/overlays/",
			"Image"
		}
	}
	size = 64M
}

image sdcard.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}

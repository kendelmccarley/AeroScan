<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  #root { padding: 24px; font-family: var(--font-body); }
  .wrap { display: flex; gap: 32px; align-items: stretch; }
  .rail { background: var(--surface); border-radius: var(--radius-md); box-shadow: var(--shadow-panel); }
  .label { font-family: var(--font-title); font-size: 10px; letter-spacing: var(--tracking-caps);
    text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { StatusBar, MessageBox } = window.AeroScanDesignSystem_2d719c;
  function Demo() {
    const [sel, setSel] = React.useState(0);
    return (
      <div className="wrap">
        <div>
          <p className="label">Status rail</p>
          <div className="rail">
            <StatusBar iconBase="../../assets/icons" gps="okay" adsb="on" wifi="conn_4bar"
              battery="full" time={{ day: "SAT", date: "MAR 14", clock: "21:23" }} />
          </div>
        </div>
        <div style={{ flex: 1 }}>
          <p className="label">Message box</p>
          <MessageBox
            title="Power Off"
            message="The badge will shut down. Unsaved scan history is kept on the SD card."
            buttons={[{ label: "Power Off", tone: "magenta" }, { label: "Cancel" }]}
            selectedIndex={sel} onSelect={setSel} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

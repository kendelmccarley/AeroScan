<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  #root { padding: 24px; font-family: var(--font-body); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
  .label { font-family: var(--font-title); font-size: 10px; letter-spacing: var(--tracking-caps);
    text-transform: uppercase; color: var(--text-muted); margin: 0 0 14px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Toggle, Checkbox } = window.AeroScanDesignSystem_2d719c;
  function Demo() {
    const [a, setA] = React.useState(true);
    const [b, setB] = React.useState(false);
    const [c, setC] = React.useState(true);
    return (
      <div className="cols">
        <div>
          <p className="label">Toggle</p>
          <div className="stack">
            <Toggle checked={a} onChange={setA} label="Dark Maps" />
            <Toggle checked={b} onChange={setB} tone="teal" label="12-hour Clock" />
            <Toggle checked tone="green" label="ADS-B Receiver" />
            <Toggle checked={false} disabled label="Fast Charge" />
          </div>
        </div>
        <div>
          <p className="label">Checkbox</p>
          <div className="stack">
            <Checkbox checked={c} onChange={setC} label="Persist last position" />
            <Checkbox checked={false} label="Hide ground traffic" />
            <Checkbox indeterminate label="Selected bands" />
            <Checkbox checked disabled label="Locked setting" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

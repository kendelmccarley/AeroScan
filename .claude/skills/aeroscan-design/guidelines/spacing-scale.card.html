<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base ramp" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:#0c0c0c}
  .wrap{padding:24px;display:flex;align-items:flex-end;gap:16px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--text-amber);width:var(--w);height:var(--w);border-radius:2px}
  .lab{font-family:var(--font-body);font-size:10px;color:var(--text-muted)}
</style></head>
<body><div class="wrap">
  <div class="col"><div class="bar" style="--w:4px"></div><div class="lab">1 · 4</div></div>
  <div class="col"><div class="bar" style="--w:8px"></div><div class="lab">2 · 8</div></div>
  <div class="col"><div class="bar" style="--w:12px"></div><div class="lab">3 · 12</div></div>
  <div class="col"><div class="bar" style="--w:16px"></div><div class="lab">4 · 16</div></div>
  <div class="col"><div class="bar" style="--w:20px"></div><div class="lab">5 · 20</div></div>
  <div class="col"><div class="bar" style="--w:24px"></div><div class="lab">6 · 24</div></div>
  <div class="col"><div class="bar" style="--w:32px"></div><div class="lab">8 · 32</div></div>
  <div class="col"><div class="bar" style="--w:48px"></div><div class="lab">12 · 48</div></div>
</div></body></html>

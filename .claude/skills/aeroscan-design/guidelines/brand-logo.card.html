<!-- @dsCard group="Brand" viewport="700x260" name="Logo & mark" subtitle="Parhelia Technology lockup + the sundog spark mark" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:#0c0c0c;font-family:var(--font-body)}
  .wrap{padding:26px;display:flex;align-items:center;gap:34px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:12px}
  .lockup{height:150px;display:block}
  .mark{height:120px;display:block;filter:drop-shadow(0 0 10px rgba(248,175,28,0.35))}
  .lab{font-family:var(--font-title);font-size:10px;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-muted)}
  .div{width:1px;height:150px;background:rgba(255,255,255,.1)}
</style></head>
<body><div class="wrap">
  <div class="cell"><img class="lockup" src="../assets/brand/parhelia-logo-dark.png" alt="Parhelia Technology" /><span class="lab">Primary lockup · on dark</span></div>
  <div class="div"></div>
  <div class="cell"><img class="mark" src="../assets/brand/parhelia-mark.png" alt="Sundog mark" /><span class="lab">Sundog spark · mark</span></div>
</div></body></html>

<!-- @dsCard group="Colors" viewport="700x150" name="Text & accent" subtitle="Amber titles · teal selection · muted body · magenta action" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:#0c0c0c;font-family:var(--font-body)}
  .wrap{padding:20px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1 1 0;min-width:96px;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-panel)}
  .chip{height:60px}
  .meta{padding:8px 10px;background:rgba(255,255,255,0.03)}
  .name{font-family:var(--font-title);font-size:11px;letter-spacing:var(--tracking-label);color:var(--text-muted);text-transform:uppercase}
  .hex{font-size:11px;color:var(--text-muted);opacity:.7;margin-top:3px;font-family:var(--font-body)}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--text-amber)"></div><div class="meta"><div class="name">Amber</div><div class="hex">#ffac11</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--text-teal)"></div><div class="meta"><div class="name">Teal</div><div class="hex">#0a7985</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--text-muted)"></div><div class="meta"><div class="name">Muted</div><div class="hex">#999999</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--link-magenta)"></div><div class="meta"><div class="name">Magenta</div><div class="hex">#db1675</div></div></div>
</div></body></html>

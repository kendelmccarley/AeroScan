<!-- @dsCard group="Brand" viewport="700x230" name="Mascots & motifs" subtitle="The badge's hacker-aerospace personality" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:#0c0c0c;font-family:var(--font-body)}
  .wrap{padding:24px;display:flex;align-items:flex-end;gap:30px;justify-content:center}
  .cell{display:flex;flex-direction:column;align-items:center;gap:12px}
  .cell img{height:120px;display:block;object-fit:contain}
  .helm{height:120px;width:100px;background:var(--text-muted);-webkit-mask:url(../assets/brand/canard_logo.png) center/contain no-repeat;mask:url(../assets/brand/canard_logo.png) center/contain no-repeat}
  .lab{font-family:var(--font-title);font-size:10px;letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--text-muted);text-align:center}
</style></head>
<body><div class="wrap">
  <div class="cell"><img src="../assets/brand/FrogFly.png" alt="FrogFly" /><span class="lab">FrogFly<br/>splash mascot</span></div>
  <div class="cell"><img src="../assets/brand/alien_tesla.png" alt="Roadster" /><span class="lab">Starman roadster<br/>oscilloscope easter egg</span></div>
  <div class="cell"><div class="helm"></div><span class="lab">Canard helmet<br/>radio tuner mark</span></div>
</div></body></html>

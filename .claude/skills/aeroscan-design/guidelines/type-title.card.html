<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:#0c0c0c}
  .wrap{padding:24px 26px;display:flex;flex-direction:column;gap:14px}
  .t1{font-family:var(--font-title);font-size:26px;color:var(--text-amber);letter-spacing:var(--tracking-title);line-height:1}
  .t2{font-family:var(--font-title);font-size:22px;color:var(--text-amber);letter-spacing:var(--tracking-title);line-height:1}
  .lab{font-family:var(--font-title);font-size:13px;color:var(--text-teal);letter-spacing:var(--tracking-caps);text-transform:uppercase}
  .meta{font-family:var(--font-body);font-size:11px;color:var(--text-muted)}
</style></head>
<body><div class="wrap">
  <div class="t1">Radar Scope</div>
  <div class="t2">Flight List</div>
  <div class="lab">AIRSPACE · 14 CONTACTS</div>
  <div class="meta">Neuropol X · titles 22–26px · labels 13px uppercase, tracking 0.04–0.12em</div>
</div></body></html>

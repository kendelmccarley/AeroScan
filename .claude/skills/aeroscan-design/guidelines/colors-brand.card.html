<!-- @dsCard group="Colors" viewport="700x150" name="Parhelia Technology brand" subtitle="Solar amber + graphite — the parhelion logo palette" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:#0c0c0c;font-family:var(--font-body)}
  .wrap{padding:20px;display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-panel)}
  .chip{height:64px}
  .meta{padding:8px 10px;background:rgba(255,255,255,0.03)}
  .name{font-family:var(--font-title);font-size:11px;letter-spacing:var(--tracking-label);color:var(--text-muted);text-transform:uppercase}
  .hex{font-size:11px;color:var(--text-muted);opacity:.7;margin-top:3px}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--brand-amber)"></div><div class="meta"><div class="name">Solar Amber</div><div class="hex">#f8af1c</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--brand-amber-deep)"></div><div class="meta"><div class="name">Amber Deep</div><div class="hex">#e0920a</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--brand-graphite)"></div><div class="meta"><div class="name">Graphite</div><div class="hex">#414143</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--brand-paper)"></div><div class="meta"><div class="name">Paper</div><div class="hex">#e9e6df</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--av-cyan)"></div><div class="meta"><div class="name">Accent Cyan</div><div class="hex">#00b0f0</div></div></div>
</div></body></html>

<!-- @dsCard group="Type" viewport="700x250" name="Type scale" subtitle="Device-native px ramp, 480px panel" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:#0c0c0c}
  .wrap{padding:20px 26px;display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:baseline;gap:16px}
  .tok{font-family:var(--font-body);font-size:10px;color:var(--text-muted);width:120px;flex:0 0 auto;opacity:.7}
  .spec{font-family:var(--font-title);color:var(--text-amber);line-height:1.05;white-space:nowrap}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="tok">--size-hero 40</span><span class="spec" style="font-size:40px">Aa</span></div>
  <div class="row"><span class="tok">--size-title 26</span><span class="spec" style="font-size:26px">Radar Scope</span></div>
  <div class="row"><span class="tok">--size-title-sm 22</span><span class="spec" style="font-size:22px">Flight List</span></div>
  <div class="row"><span class="tok">--size-label 16</span><span class="spec" style="font-size:16px">Map Scope</span></div>
  <div class="row"><span class="tok">--size-body 14</span><span class="spec" style="font-size:14px;font-family:var(--font-body);color:var(--text-muted)">Dialog body copy</span></div>
  <div class="row"><span class="tok">--size-cell 11</span><span class="spec" style="font-size:11px;font-family:var(--font-body);color:var(--text-muted)">SWA241 · 34000 · 4.2 nm</span></div>
</div></body></html>

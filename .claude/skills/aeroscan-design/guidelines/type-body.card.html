<!-- @dsCard group="Type" viewport="700x240" name="Body & data — Lato" subtitle="Everything readable: copy, telemetry, table cells" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:#0c0c0c}
  .wrap{padding:24px 26px;display:flex;flex-direction:column;gap:12px;max-width:560px}
  .body{font-family:var(--font-body);font-size:14px;color:var(--text-muted);line-height:1.45}
  .bold{font-family:var(--font-body);font-weight:700;color:#cfcfcf}
  .data{font-family:var(--font-body);font-size:12px;color:var(--text-muted)}
  .cell{font-family:var(--font-body);font-size:11px;color:var(--text-amber)}
  .meta{font-family:var(--font-body);font-size:11px;color:var(--text-muted);opacity:.7;margin-top:6px}
</style></head>
<body><div class="wrap">
  <div class="body">The badge will shut down. Unsaved scan history is kept on the SD card. <span class="bold">Hold B to confirm.</span></div>
  <div class="data">Total Aircraft: 14 · Nearest 4.2 nm · Sweep 50 ms</div>
  <div class="cell">SWA241&nbsp;&nbsp;34000&nbsp;&nbsp;452&nbsp;&nbsp;271&nbsp;&nbsp;4.20</div>
  <div class="meta">Lato · body 14px / data 12px / cell 11px (firmware 9pt) · Regular + Bold</div>
</div></body></html>
